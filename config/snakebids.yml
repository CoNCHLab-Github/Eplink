# path to freesurfer image
sif_freesurfer: /project/6033493/shared/containers/freesurfer/freesurfer-7.2.0.sif

# path to freesurfer license file:
fs_license: /project/6033493/shared/containers/freesurfer/freesurfer_license.txt

# Dataset configs
dataset: EpLink3
movie_name: movie
n_dummies: 0
n_volumes: 384
# movie_name: hitchcock (for phase II)/movie (for phase III)
# n_dummies: 5 (for phase II)/0 (for phase III)
# n_voluems: 240 (for phase II) and resampled phase III/384 (for phase III)

# Parcellation configs
parcellations:
  - Desikan
  - Glasser2016
  - Schaefer2018_Kong2022_400
  - Yan2023_Kong2022_400

# Smoothing configs
fwhm:
  - 0
  - 5
  - 7
  - 10
  - 12
  - 15
  - 20
  - 30
  - 40
  - 60
  - 80

# Temporal resampling configs
resampling:
  - N
  # - Y

original_TR: 1.25 
target_TR: 2

# ---
participants_tsv: '/project/6033493/datasets/{dataset}/participants.tsv'
# # Denoise configs
# search_terms: {}
# #optional: specify tar containing a particular subject'a freesurfer folder
freesurfer_root: 'results/{dataset}/freesurfer'
freesurfer: 'results/{dataset}/freesurfer/sub-{subject}'
freesurfer_tar: '/project/6033493/datasets/{dataset}/derivatives/freesurfer-7.2.0/sub-{subject}_freesurfer-7.2.0.tar.gz'

# run `snakemake extract_fmriprep_all` first to populate this directory
fMRIprep_dir: 'results/{dataset}/fmriprep'
fmriprep_tar: '/project/6033493/datasets/{dataset}/derivatives/fmriprep-20.2.6/sub-{subject}_fmriprep-20.2.6.tar.gz'

archive_dir: '/project/6033493/datasets/{dataset}'

wb_module: 'connectome-workbench'  # check exact name with: module spider connectome
# output_dir: '/project/6050199/alit/EpLink/phase3'

hemi:
  - L
  - R

# derivatives: false
# # can alternatively have paths to derivatives folders
# # derivatives:
# #  - paths_to_any_derivatives_for_inputs_here
# #  - paths_to_any_derivatives_for_inputs_here

# # mappings from analysis_level to set of target rules or files

analysis_levels: &analysis_levels
  - participant


# targets_by_analysis_level:
#   participant:
#     - ''

pybids_inputs:
  preproc_bold:
    filters:
      suffix: bold
      desc: preproc
      extension: .nii.gz
      datatype: func
      space: T1w
      run: true
    wildcards:
      - subject
      - session
      - task
      - acquisition
      - run
      - space

  preproc_mask:
    filters:
      suffix: mask
      desc: brain
      extension: .nii.gz
      datatype: func
      space: T1w
      run: true
    wildcards:
      - subject
      - session
      - task
      - acquisition
      - run
      - space

  confounds:
    filters:
      suffix: timeseries 
      desc: confounds
      extension: .tsv
      #scope: derivatives    # raw, derivatives (or can be pipeline name too!)
      run: true
    wildcards:
      - subject
      - session
      - task
      - acquisition
      - run

# # enable printing debug statements during parsing -- disable if generating dag
# # visualization
# debug: false

# singularity:
