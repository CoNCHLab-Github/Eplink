[workspace]
name        = "eplink-isc-pipeline"
version     = "0.1.0"
description = "EpLink ISC analysis pipeline"
channels    = ["conda-forge"]
platforms   = ["linux-64"]

[dependencies]
python      = "3.11.*"
numpy       = "1.26.*"
scipy       = "1.13.*"
pandas      = "2.2.*"
nibabel     = "5.2.*"
h5py        = ">=3.8"
pip         = ">=24"

[pypi-dependencies]
snakemake                       = ">=8,<9"
snakemake-executor-plugin-slurm = ">=0.5,<1"
snakebids                       = ">=0.8,<1"
nilearn                         = ">=0.10,<0.11"
jinja2                          = ">=3.1,<4"

[feature.dev.dependencies]
pytest     = "*"
ipython    = "*"
jupyterlab = "*"

[environments]
default = { solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[activation]
env = { PYTHONNOUSERSITE = "1", WB_COMMAND = "$CONDA_PREFIX/bin/wb_command" }

[tasks]
# --- fmriprep extraction (run once before the main pipeline) ---
dry-extract-fmriprep = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until extract_fmriprep_all --dry-run"
extract-fmriprep     = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until extract_fmriprep_all"

# --- main pipeline ---
dry-run = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --dry-run"
run     = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm"

# --- individual stages ---
dry-denoise    = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until denoise_all --dry-run"
denoise        = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until denoise_all"
dry-surfaces   = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until gen_midthickness_all --dry-run"
surfaces       = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until gen_midthickness_all"
dry-fslr       = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until resample2fsLR_all --dry-run"
fslr           = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until resample2fsLR_all"
dry-smooth     = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until smooth_all --dry-run"
smooth         = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until smooth_all"
dry-parcellate = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until parcellate_original_all --dry-run"
parcellate     = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until parcellate_original_all"
dry-isc        = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until ISC_all --dry-run"
isc            = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until ISC_all"
dry-pwisc-swb  = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until pwISC_bootstrap_movie --dry-run"
pwisc-swb      = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until pwISC_bootstrap_movie"

dry-archive = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until archive_results --dry-run"
archive     = "snakemake --snakefile workflow/Snakefile --profile workflow/profiles/slurm --until archive_results"

dag = "snakemake --snakefile workflow/Snakefile --dag | dot -Tsvg > dag.svg"
